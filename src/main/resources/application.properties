spring.application.name=uzhavan

# ===== Database Configuration (MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/uzhavan_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Server =====
server.port=8098

# ===== JWT Configuration =====
jwt.secret=uzhavanSecretKeyForJwtTokenGenerationMustBeLongEnough123456
jwt.expiration=86400000

# ===== Logging =====
logging.level.org.springframework.security=DEBUG
logging.level.com.uzhavan=DEBUG
logging.level.org.springframework.web=DEBUG

# ===== Disable Default Security User =====
spring.security.user.name=ignored
spring.security.user.password=ignored